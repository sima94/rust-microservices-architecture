global
    log stdout format raw local0

defaults
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend pg_write
    bind *:5432
    default_backend pg_master

backend pg_master
    option httpchk GET /master
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server node1 patroni-auth-1:5432 check port 8008
    server node2 patroni-auth-2:5432 check port 8008
    server node3 patroni-auth-3:5432 check port 8008
