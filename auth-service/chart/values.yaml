microservice:
  image:
    repository: auth-service-arm64
    tag: "latest"

  containerPort: 8081

  service:
    port: 8081

  autoscaling:
    enabled: false

  config:
    REDIS_URL: "redis://redis:6379"
    KAFKA_BROKER: "kafka:29092"
    DB_POOL_MAX_SIZE: "10"
    ACCESS_TOKEN_TTL_SECS: "300"
    REFRESH_TOKEN_TTL_DAYS: "7"

  secrets:
    DATABASE_URL: ""
    DATABASE_READ_URL: ""
    JWT_SECRET: ""
