controller:
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
  ingressClass: nginx
  service:
    type: LoadBalancer
  replicaCount: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 512Mi
  metrics:
    enabled: true
  config:
    use-forwarded-headers: "true"
