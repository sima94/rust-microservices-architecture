name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'postman/**'
      - 'scripts/**'
      - 'terraform/**'
      - 'helm/**'
      - 'docker/**'
      - '.secrets/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'postman/**'
      - 'scripts/**'
      - 'terraform/**'
      - 'helm/**'
      - 'docker/**'
      - '.secrets/**'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    services:
      postgres-user:
        image: postgres:15
        env:
          POSTGRES_USER: rust_user
          POSTGRES_PASSWORD: rust_pass
          POSTGRES_DB: rust_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-auth:
        image: postgres:15
        env:
          POSTGRES_USER: rust_user
          POSTGRES_PASSWORD: rust_pass
          POSTGRES_DB: auth_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run user-service migrations
        env:
          DATABASE_URL: postgres://rust_user:rust_pass@localhost:5432/rust_db
        run: |
          for f in user-service/migrations/**/up.sql; do
            echo "Running migration: $f"
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Run auth-service migrations
        env:
          DATABASE_URL: postgres://rust_user:rust_pass@localhost:5433/auth_db
        run: |
          for f in auth-service/migrations/**/up.sql; do
            echo "Running migration: $f"
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run user-service tests
        env:
          DATABASE_URL: postgres://rust_user:rust_pass@localhost:5432/rust_db
          DATABASE_READ_URL: postgres://rust_user:rust_pass@localhost:5432/rust_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          KAFKA_BROKER: localhost:9092
        run: cargo test -p user-service

      - name: Run auth-service tests
        env:
          DATABASE_URL: postgres://rust_user:rust_pass@localhost:5433/auth_db
          DATABASE_READ_URL: postgres://rust_user:rust_pass@localhost:5433/auth_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          KAFKA_BROKER: localhost:9092
        run: cargo test -p auth-service

      - name: Run shared tests
        run: cargo test -p shared

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [auth-service, user-service]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to OCI Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ vars.DOCKER_REGISTRY }}/${{ matrix.service }}:dev-latest
