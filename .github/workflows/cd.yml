name: CD

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'postman/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  REGISTRY: ${{ vars.DOCKER_REGISTRY }}

jobs:
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: determine-env
    if: ${{ vars.DOCKER_REGISTRY != '' && secrets.DOCKER_USERNAME != '' }}
    strategy:
      matrix:
        service: [auth-service, user-service]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ needs.determine-env.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ needs.determine-env.outputs.environment }}-latest

  deploy:
    name: Deploy to ${{ needs.determine-env.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [determine-env, build-push]
    if: ${{ secrets.KUBECONFIG != '' }}
    environment: ${{ needs.determine-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy services
        env:
          ENVIRONMENT: ${{ needs.determine-env.outputs.environment }}
          IMAGE_TAG: ${{ needs.determine-env.outputs.image_tag }}
        run: |
          ./scripts/deploy-services.sh "$ENVIRONMENT"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/auth-service -n ${{ needs.determine-env.outputs.environment }} --timeout=180s
          kubectl rollout status deployment/user-service -n ${{ needs.determine-env.outputs.environment }} --timeout=180s
